<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 560" role="img" aria-label="Flat illustration of three diverse college students standing together outdoors with books, in front of trees, hills, and a sun.">
  <title>Three diverse college students together outdoors</title>
  <!-- backdrop -->
  <rect width="760" height="560" fill="#F2EFFA"/>
  <!-- sun / integral circle motif -->
  <circle cx="592" cy="150" r="92" fill="#DCDAF2"/>
  <circle cx="592" cy="150" r="64" fill="none" stroke="#8E87D6" stroke-width="4"/>
  <circle cx="592" cy="150" r="38" fill="none" stroke="#534AB7" stroke-width="4"/>
  <circle cx="592" cy="150" r="12" fill="#534AB7"/>
  <!-- distant hills -->
  <path d="M0 430 Q190 360 380 420 T760 410 V560 H0 Z" fill="#CFE3D6"/>
  <path d="M0 470 Q230 410 470 460 T760 455 V560 H0 Z" fill="#9CCBB0"/>
  <rect y="496" width="760" height="64" fill="#7FB89A"/>
  <!-- trees -->
  <g>
    <rect x="92" y="372" width="14" height="70" rx="6" fill="#7A5638"/>
    <circle cx="99" cy="352" r="44" fill="#3E7D58"/>
    <circle cx="69" cy="372" r="30" fill="#4E8E66"/>
    <circle cx="129" cy="372" r="30" fill="#4E8E66"/>
  </g>
  <g>
    <rect x="676" y="392" width="12" height="64" rx="6" fill="#7A5638"/>
    <circle cx="682" cy="372" r="34" fill="#4E8E66"/>
    <circle cx="660" cy="388" r="22" fill="#3E7D58"/>
    <circle cx="704" cy="388" r="22" fill="#3E7D58"/>
  </g>
  <!-- student 1 (deep skin, teal top) -->
  <g>
    <ellipse cx="250" cy="540" rx="70" ry="14" fill="#6FAE90"/>
    <rect x="214" y="372" width="72" height="120" rx="22" fill="#2F8F83"/>
    <rect x="222" y="470" width="22" height="70" rx="9" fill="#3A3550"/>
    <rect x="256" y="470" width="22" height="70" rx="9" fill="#3A3550"/>
    <circle cx="250" cy="338" r="34" fill="#6B4A38"/>
    <path d="M216 332 Q250 286 284 332 Q284 306 250 300 Q216 306 216 332 Z" fill="#2A1F18"/>
    <rect x="232" y="404" width="56" height="40" rx="5" fill="#E0A43B"/>
  </g>
  <!-- student 2 (light skin, purple top) center, taller -->
  <g>
    <ellipse cx="372" cy="544" rx="78" ry="15" fill="#6FAE90"/>
    <rect x="330" y="346" width="84" height="138" rx="24" fill="#534AB7"/>
    <rect x="340" y="462" width="24" height="82" rx="10" fill="#3A3550"/>
    <rect x="380" y="462" width="24" height="82" rx="10" fill="#3A3550"/>
    <circle cx="372" cy="308" r="38" fill="#E0B48C"/>
    <path d="M334 304 Q372 250 410 304 Q412 274 372 268 Q332 274 334 304 Z" fill="#7A4A1E"/>
    <rect x="348" y="384" width="48" height="60" rx="6" fill="#FBF7EE"/>
    <line x1="372" y1="388" x2="372" y2="440" stroke="#C9C2B4" stroke-width="3"/>
  </g>
  <!-- student 3 (medium skin, coral top) -->
  <g>
    <ellipse cx="500" cy="540" rx="70" ry="14" fill="#6FAE90"/>
    <rect x="464" y="376" width="72" height="118" rx="22" fill="#D9714E"/>
    <rect x="472" y="472" width="22" height="68" rx="9" fill="#3A3550"/>
    <rect x="506" y="472" width="22" height="68" rx="9" fill="#3A3550"/>
    <circle cx="500" cy="342" r="34" fill="#A9714B"/>
    <path d="M466 348 Q466 300 500 300 Q534 300 534 348 Q520 322 500 322 Q480 322 466 348 Z" fill="#2A1F18"/>
    <rect x="482" y="408" width="56" height="38" rx="5" fill="#2F8F83"/>
